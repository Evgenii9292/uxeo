  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-color: #1e262a;
      background-image: url('/bg-splash.jpg');
      background-size: cover;
      background-position: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #splash img {
      width: min(286px, 52vw);
      height: auto;
    }
    #splash p {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 16px;
      line-height: 1.45;
      color: rgba(121, 133, 137, 0.7);
      letter-spacing: 0.02em;
      text-align: center;
      margin: 0;
    }
  </style>
